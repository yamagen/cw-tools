const svg=d3.select("#graph"),tip=d3.select("#tip");
const defs=svg.append("defs");
defs.append("marker").attr("id","arrow").attr("viewBox","0 -5 10 10").attr("refX",16).attr("refY",0).attr("markerWidth",6).attr("markerHeight",6).attr("orient","auto").append("path").attr("d","M0,-5L10,0L0,5").attr("fill","#777");
const root=svg.append("g");
svg.call(d3.zoom().scaleExtent([.1,8]).on("zoom",e=>root.attr("transform",e.transform)));
const width=()=>svg.node().clientWidth||960;
const height=()=>svg.node().clientHeight||720;
const maxAbsZ=d3.max(graph.links,d=>Math.abs(d.z))||1;
const edgeWidth=d3.scaleLinear().domain([0,maxAbsZ]).range([.6,4]);
const link=root.append("g").selectAll("line").data(graph.links).join("line").attr("class","link").attr("stroke-width",d=>edgeWidth(Math.abs(d.z))).attr("marker-end",graph.directed?"url(#arrow)":null);
const node=root.append("g").selectAll("g").data(graph.nodes).join("g").attr("class","node").call(d3.drag().on("start",dragstarted).on("drag",dragged).on("end",dragended));
node.append("circle").attr("r",d=>Math.max(9,d.font_size*.7));
node.append("text").text(d=>d.label).style("font-size",d=>`${d.font_size}px`);
function showTip(event,text){tip.style("display","block").text(text);moveTip(event)}
function moveTip(event){tip.style("left",`${event.clientX+12}px`).style("top",`${event.clientY+12}px`)}
function hideTip(){tip.style("display","none")}
node.on("mouseenter",(e,d)=>showTip(e,`label: ${d.label}\nid: ${d.id}\ndf: ${d.df}\nidf: ${d.idf}\nfq: ${d.fq??"NA"}\ndegree: ${d.degree}`)).on("mousemove",moveTip).on("mouseleave",hideTip);
link.on("mouseenter",(e,d)=>showTip(e,`source: ${d.source.id??d.source}\ntarget: ${d.target.id??d.target}\nctf: ${d.ctf}\ncdf: ${d.cdf}\ncw: ${d.cw}\nz: ${d.z}\nunit_ids: ${d.unit_ids.join(", ")}`)).on("mousemove",moveTip).on("mouseleave",hideTip);
const simulation=d3.forceSimulation(graph.nodes).force("link",d3.forceLink(graph.links).id(d=>d.id).distance(77)).force("charge",d3.forceManyBody().strength(-180)).force("center",d3.forceCenter(width()/2,height()/2)).force("collision",d3.forceCollide().radius(d=>Math.max(14,d.font_size*.9))).on("tick",()=>{link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);node.attr("transform",d=>`translate(${d.x},${d.y})`)});
function dragstarted(e,d){if(!e.active)simulation.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}
function dragged(e,d){d.fx=e.x;d.fy=e.y}
function dragended(e,d){if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null}
window.addEventListener("resize",()=>simulation.force("center",d3.forceCenter(width()/2,height()/2)).alpha(.2).restart());
